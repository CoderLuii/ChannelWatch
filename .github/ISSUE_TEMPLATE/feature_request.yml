name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["type/feature", "status/needs-triage"]
assignees:
  - CoderLuii
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the use case clearly so we can understand the value before committing to scope.

        **Before opening:** search [Discussions](https://github.com/CoderLuii/ChannelWatch/discussions) and existing issues — your idea may already be tracked or discussed.

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Describe the real-world scenario this feature would address. Focus on the problem, not the solution.
      placeholder: "When I have multiple DVRs in different locations, I can't tell at a glance which one is having issues because..."
    validations:
      required: true

  - type: textarea
    id: current_workaround
    attributes:
      label: Current workaround
      description: How do you handle this today? Even if the workaround is "I can't" — say so.
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific or as high-level as you like.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: How would you know this feature is working correctly? List the conditions that would satisfy you.
      placeholder: |
        - [ ] The dashboard shows a per-DVR health badge
        - [ ] Clicking the badge opens a detail panel
        - [ ] The badge updates within 60 seconds of a DVR going offline
    validations:
      required: false

  - type: dropdown
    id: priority_self
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would significantly improve my workflow
        - Blocking my use of ChannelWatch
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to similar features in other tools.
    validations:
      required: false
