name: ChannelWatch - PR Validation

env:
  DOCKER_PLATFORMS: linux/amd64,linux/arm64

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Multi-arch Docker build validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Validate multi-arch Docker build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: false
          provenance: false

  python-checks:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r deploy/requirements/runtime.txt -r deploy/requirements/dev.txt

      - name: Check Python syntax
        run: python -m compileall app/core app/ui/backend

      - name: Run Python tests
        run: pytest -c deploy/config/pytest.ini app/core/tests

  helm-chart:
    name: Helm chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint Helm chart
        run: helm lint deploy/helm/channelwatch

      - name: Render ingress-enabled Helm chart
        run: |
          set -euo pipefail
          rendered="$(helm template deploy/helm/channelwatch \
            --set ingress.enabled=true \
            --set ingress.className=nginx \
            --set 'ingress.annotations.foo=bar' \
            --set 'ingress.tls[0].secretName=channelwatch-tls' \
            --set 'ingress.tls[0].hosts[0]=channelwatch.local')"
          ingress_count="$(printf '%s\n' "$rendered" | awk '
            /^kind: Ingress$/ { count += 1 }
            END { print count + 0 }
          ')"
          if [ "$ingress_count" -ne 1 ]; then
            printf 'Expected exactly one Ingress, rendered %s\n' "$ingress_count" >&2
            exit 1
          fi
          printf '%s\n' "$rendered" | awk '
            /^kind: Ingress$/ { in_ingress = 1 }
            in_ingress && /^  ingressClassName: nginx$/ { class_name = 1 }
            in_ingress && /^    foo: bar$/ { annotation = 1 }
            in_ingress && /^      secretName: channelwatch-tls$/ { tls = 1 }
            END { exit !(class_name && annotation && tls) }
          '

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: app/ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app/ui

      - name: Lint frontend
        run: pnpm lint
        working-directory: app/ui

      - name: Typecheck frontend
        run: pnpm typecheck
        working-directory: app/ui

      - name: Build frontend
        run: pnpm build
        working-directory: app/ui

      - name: Run frontend unit tests
        run: pnpm test
        working-directory: app/ui

  frontend-a11y:
    name: Frontend accessibility tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: app/ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app/ui

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
        working-directory: app/ui

      - name: Run smoke test project
        run: pnpm test:smoke
        working-directory: app/ui

      - name: Run accessibility test project
        run: pnpm test:a11y:ci
        working-directory: app/ui
