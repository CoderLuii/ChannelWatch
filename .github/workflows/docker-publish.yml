name: ChannelWatch - Build and Push to Docker Hub + GHCR
run-name: ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: coderluii/channelwatch
  GHCR_IMAGE: ghcr.io/coderluii/channelwatch
  DOCKER_PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-update-bundle-and-release:
    name: Build signed update bundle and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      bundle_url: ${{ steps.assets.outputs.bundle_url }}
      manifest_url: ${{ steps.assets.outputs.manifest_url }}
      bundle_sha256: ${{ steps.assets.outputs.bundle_sha256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Parse version
        id: version
        shell: bash
        run: |
          raw="${GITHUB_REF_NAME}"
          version="${raw#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify CHANGELOG entry
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          raw_ref="${GITHUB_REF_NAME}"
          version="${{ steps.version.outputs.version }}"
          if [[ ! "${raw_ref}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must use vX.Y.Z format, got ${raw_ref}."
            exit 1
          fi
          version_re="${version//./\\.}"
          if ! grep -Eq "^## \\[${version_re}\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" docs/releases/CHANGELOG.md; then
            echo "::error::docs/releases/CHANGELOG.md has no release heading for ${version}. Add '## [${version}] - YYYY-MM-DD' before tagging."
            exit 1
          fi

      - name: Install release tooling
        run: python -m pip install --upgrade cryptography

      - name: Build frontend for app bundle
        working-directory: app/ui
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm test
          pnpm typecheck
          pnpm build

      - name: Build signed app bundle
        env:
          CHANNELWATCH_UPDATE_SIGNING_KEY: ${{ secrets.CHANNELWATCH_UPDATE_SIGNING_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if [ -z "${CHANNELWATCH_UPDATE_SIGNING_KEY}" ]; then
            echo "::error::CHANNELWATCH_UPDATE_SIGNING_KEY is required to sign update bundles."
            exit 1
          fi

          changelog_section="$(
            awk -v version="${VERSION}" '
              BEGIN { heading = "^## \\[" version "\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" }
              $0 ~ heading { in_section = 1; print; next }
              in_section && /^## \[/ { exit }
              in_section { print }
            ' docs/releases/CHANGELOG.md
          )"
          image_required_args=()
          if grep -Eiq "container image update required|image-required" <<< "${changelog_section}"; then
            image_required_args+=(--image-required)
            echo "Release ${TAG} will be marked as container image update required."
          fi

          python scripts/release/build-update-bundle.py \
            --version "${VERSION}" \
            --bundle-url "https://github.com/CoderLuii/ChannelWatch/releases/download/${TAG}/channelwatch-app-${TAG}.zip" \
            --release-url "https://github.com/CoderLuii/ChannelWatch/releases/tag/${TAG}" \
            "${image_required_args[@]}"

      - name: Render and validate release body
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          python scripts/release/render-release-body.py \
            --version "${VERSION}" \
            --release-url "https://github.com/CoderLuii/ChannelWatch/releases/tag/${TAG}" \
            --output release-body.md
          first_line="$(grep -m 1 -v '^[[:space:]]*$' release-body.md)"
          expected="# ChannelWatch ${TAG} - "
          if [[ "${first_line}" != ${expected}* ]]; then
            echo "::error::GitHub Release body must start with '# ChannelWatch ${TAG} -'."
            exit 1
          fi

      - name: Create or update draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --jq ".[] | select(.tag_name == \"${TAG}\") | .id" | head -n 1)"
          if [ -n "${release_id}" ]; then
            jq -n \
              --arg name "${TAG}" \
              --rawfile body release-body.md \
              '{name: $name, body: $body, prerelease: false}' > release-draft.json
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              --input release-draft.json
          else
            gh release create "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${TAG}" \
              --notes-file release-body.md \
              --draft
          fi

      - name: Upload update assets
        id: assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          bundle="dist/update/channelwatch-app-${TAG}.zip"
          manifest="dist/update/channelwatch-update-${TAG}.json"
          if [ ! -f "${bundle}" ] || [ ! -f "${manifest}" ]; then
            echo "::error::Expected update assets were not created."
            exit 1
          fi
          gh release upload "${TAG}" "${bundle}" "${manifest}" --repo "${GITHUB_REPOSITORY}" --clobber
          bundle_sha="$(sha256sum "${bundle}" | awk '{print $1}')"
          {
            echo "bundle_url=https://github.com/CoderLuii/ChannelWatch/releases/download/${TAG}/channelwatch-app-${TAG}.zip"
            echo "manifest_url=https://github.com/CoderLuii/ChannelWatch/releases/download/${TAG}/channelwatch-update-${TAG}.json"
            echo "bundle_sha256=${bundle_sha}"
          } >> "${GITHUB_OUTPUT}"

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build-update-bundle-and-release
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Parse version
        id: version
        shell: bash
        run: |
          raw="${GITHUB_REF_NAME}"
          version="${raw#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify CHANGELOG entry
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          raw_ref="${GITHUB_REF_NAME}"
          version="${{ steps.version.outputs.version }}"
          if [[ ! "${raw_ref}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must use vX.Y.Z format, got ${raw_ref}."
            exit 1
          fi
          version_re="${version//./\\.}"
          if ! grep -Eq "^## \\[${version_re}\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" docs/releases/CHANGELOG.md; then
            echo "::error::docs/releases/CHANGELOG.md has no release heading for ${version}. Add '## [${version}] - YYYY-MM-DD' before tagging."
            exit 1
          fi

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: index.docker.io/${{ env.DOCKERHUB_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  update-dockerhub-description:
    name: Update Docker Hub description
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          readme-filepath: docs/dockerhub-description.md

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-update-bundle-and-release
      - build-and-push
      - update-dockerhub-description
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Parse version
        id: version
        shell: bash
        run: |
          raw="${GITHUB_REF_NAME}"
          version="${raw#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Render release body
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          python scripts/release/render-release-body.py \
            --version "${VERSION}" \
            --release-url "https://github.com/CoderLuii/ChannelWatch/releases/tag/${TAG}" \
            --output release-body.md

      - name: Publish release after image verification gates
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --jq ".[] | select(.tag_name == \"${TAG}\") | .id" | head -n 1)"
          if [ -z "${release_id}" ]; then
            echo "::error::Draft release for ${TAG} was not found."
            exit 1
          fi
          jq -n \
            --arg name "${TAG}" \
            --rawfile body release-body.md \
            '{name: $name, body: $body, draft: false, prerelease: false}' > publish-release.json
          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            --input publish-release.json

  sync-site:
    name: Sync website release metadata
    runs-on: ubuntu-latest
    needs:
      - build-update-bundle-and-release
      - build-and-push
      - update-dockerhub-description
      - publish-github-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Parse version
        id: version
        shell: bash
        run: |
          raw="${GITHUB_REF_NAME}"
          version="${raw#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Dispatch website sync
        env:
          GH_TOKEN: ${{ secrets.SITE_SYNC_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REPO: ${{ github.repository }}
          UPDATE_BUNDLE_URL: ${{ needs.build-update-bundle-and-release.outputs.bundle_url }}
          UPDATE_MANIFEST_URL: ${{ needs.build-update-bundle-and-release.outputs.manifest_url }}
          UPDATE_BUNDLE_SHA256: ${{ needs.build-update-bundle-and-release.outputs.bundle_sha256 }}
        shell: bash
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::SITE_SYNC_TOKEN is required to dispatch the website sync workflow."
            exit 1
          fi

          jq -n \
            --arg version "${VERSION}" \
            --arg tag "${TAG}" \
            --arg sha "${SOURCE_SHA}" \
            --arg release_url "https://github.com/CoderLuii/ChannelWatch/releases/tag/${TAG}" \
            --arg source_repo "${SOURCE_REPO}" \
            --arg update_bundle_url "${UPDATE_BUNDLE_URL}" \
            --arg update_manifest_url "${UPDATE_MANIFEST_URL}" \
            --arg update_bundle_sha256 "${UPDATE_BUNDLE_SHA256}" \
            '{
              event_type: "channelwatch-release",
              client_payload: {
                version: $version,
                tag: $tag,
                sha: $sha,
                release_url: $release_url,
                source_repo: $source_repo,
                update_bundle_url: $update_bundle_url,
                update_manifest_url: $update_manifest_url,
                update_bundle_sha256: $update_bundle_sha256
              }
            }' > site-sync-dispatch.json

          gh api \
            --method POST \
            repos/CoderLuii/ChannelWatch-site/dispatches \
            --input site-sync-dispatch.json
