name: channelwatch-three-dvrs-staged-env

services:
  channelwatch:
    image: ${CHANNELWATCH_IMAGE:-coderluii/channelwatch:latest} # ChannelWatch image tag to run for this staged-environment profile.
    container_name: ${CHANNELWATCH_CONTAINER_NAME:-channelwatch-three-dvrs-staged-env} # Container name used by docker ps and logs for this profile.
    init: true
    network_mode: bridge
    ports:
      - "${CHANNELWATCH_HTTP_PORT:-38501}:8501" # Host port that exposes the UI and health endpoints on this machine.
    volumes:
      - "${CHANNELWATCH_CONFIG_DIR:-./.compose-data/three-dvrs-staged-env}:/config" # Host path that stores settings.json, logs, history, and per-DVR state.
    environment:
      CHANNELS_DVR_SERVERS: "${CHANNELS_DVR_SERVERS:-Primary@stage-dvr-1.example.invalid:8089,Backup@stage-dvr-2.example.invalid:8089,Archive@stage-dvr-3.example.invalid:8089}" # Comma-separated Name@host:port list that bootstraps three staged DVR entries.
      TZ: "${TZ:-America/New_York}" # IANA timezone used for UI timestamps and scheduled-event formatting.
      CHANNELWATCH_SECRET_STORAGE_KEY: "${CHANNELWATCH_SECRET_STORAGE_KEY:?set a unique value of at least 32 characters}" # Required for new local secret-key writes.
      PUID: "${PUID:-1000}" # Host user id that should own files written under /config.
      PGID: "${PGID:-1000}" # Host group id that should own files written under /config.
      CW_LOG_LEVEL: "${CW_LOG_LEVEL:-2}" # ChannelWatch log verbosity, 1=standard, 2=verbose, with staged env defaulting to verbose logs.
      CW_DISABLE_AUTH: "${CW_DISABLE_AUTH:-false}" # Set to true only for trusted local testing where API auth should be disabled.
    restart: unless-stopped
