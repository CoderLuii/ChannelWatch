name: channelwatch-two-dvrs

services:
  channelwatch:
    image: ${CHANNELWATCH_IMAGE:-coderluii/channelwatch:latest} # ChannelWatch image tag to run for this profile.
    container_name: ${CHANNELWATCH_CONTAINER_NAME:-channelwatch-two-dvrs} # Container name used by docker ps and logs for this profile.
    init: true
    network_mode: bridge
    ports:
      - "${CHANNELWATCH_HTTP_PORT:-28501}:8501" # Host port that exposes the UI and health endpoints on this machine.
    volumes:
      - "${CHANNELWATCH_CONFIG_DIR:-./.compose-data/two-dvrs}:/config" # Host path that stores settings.json, logs, history, and per-DVR state.
    environment:
      CHANNELS_DVR_SERVERS: "${CHANNELS_DVR_SERVERS:-Living Room@dvr-one.example.invalid:8089,Bedroom@dvr-two.example.invalid:8089}" # Comma-separated Name@host:port list that bootstraps two DVR connections.
      TZ: "${TZ:-America/New_York}" # IANA timezone used for UI timestamps and scheduled-event formatting.
      PUID: "${PUID:-1000}" # Host user id that should own files written under /config.
      PGID: "${PGID:-1000}" # Host group id that should own files written under /config.
      CW_LOG_LEVEL: "${CW_LOG_LEVEL:-1}" # ChannelWatch log verbosity, 1=standard, 2=verbose.
      CW_DISABLE_AUTH: "${CW_DISABLE_AUTH:-false}" # Set to true only for trusted local testing where API auth should be disabled.
    restart: unless-stopped
